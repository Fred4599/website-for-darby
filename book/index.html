<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Book Service - Larry's Chevron | Nampa, ID</title>
    <meta name="description" content="Schedule your auto service appointment with Larry's Chevron in Nampa, Idaho. Fast, reliable, full-service repair shop." />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0072CE",
                        secondary: "#D41E2D",
                        "primary-dark": "#005fa8",
                        "background-light": "#F3F4F6",
                        "background-dark": "#111827",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1F2937",
                        "text-light": "#1F2937",
                        "text-dark": "#F9FAFB",
                        "border-light": "#E2E8F0",
                    },
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    },
                    borderRadius: {
                        DEFAULT: "0.375rem",
                    },
                },
            },
        };
    </script>
    <style>
        .mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .mobile-menu.open {
            max-height: 400px;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        #booking-iframe-wrapper {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #booking-iframe-inner {
            width: 100%;
            flex: 1;
            min-height: 0;
        }
        #booking-iframe-inner iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        @media (min-width: 768px) {
            #booking-iframe-wrapper {
                padding: 24px 24px 0;
                background-color: #F3F4F6;
            }
            #booking-iframe-inner {
                max-width: 800px;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
                border: 1px solid #E2E8F0;
                background: #fff;
            }
        }
    </style>
</head>
<body class="bg-background-light text-text-light font-sans min-h-screen flex flex-col overflow-x-hidden">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-surface-light/95 backdrop-blur-sm border-b border-gray-200 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="/" class="flex-shrink-0 flex items-center gap-2">
                    <img src="/images/logo.png" alt="Larry's Chevron" class="h-14 w-auto" />
                </a>
                <div class="hidden md:flex space-x-8 items-center">
                    <a class="text-gray-600 hover:text-primary font-medium transition-colors" href="/">Home</a>
                    <a class="text-gray-600 hover:text-primary font-medium transition-colors" href="/#services">Services</a>
                    <a class="text-gray-600 hover:text-primary font-medium transition-colors" href="/#about">About Us</a>
                    <a class="text-gray-600 hover:text-primary font-medium transition-colors" href="/#contact">Contact</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="menuToggle" class="text-gray-600 hover:text-primary focus:outline-none" aria-label="Toggle menu">
                        <span class="material-symbols-outlined text-3xl" id="menuIcon">menu</span>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobileMenu" class="mobile-menu md:hidden bg-white border-t border-gray-100">
            <div class="px-4 py-4 space-y-3">
                <a class="block text-gray-700 hover:text-primary font-medium py-2" href="/">Home</a>
                <a class="block text-gray-700 hover:text-primary font-medium py-2" href="/#services">Services</a>
                <a class="block text-gray-700 hover:text-primary font-medium py-2" href="/#about">About Us</a>
                <a class="block text-gray-700 hover:text-primary font-medium py-2" href="/#contact">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Booking Widget -->
    <main id="booking-iframe-wrapper">
        <div id="booking-iframe-inner">
            <iframe src="https://api.leadconnectorhq.com/widget/group/mLbBdsCD8M0k8V040bME" scrolling="no" id="mLbBdsCD8M0k8V040bME_1774550461721" title="Book an appointment"></iframe>
        </div>
    </main>
    <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>


    <script>
        // ===== Mobile menu =====
        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        const menuIcon = document.getElementById('menuIcon');
        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            menuIcon.textContent = mobileMenu.classList.contains('open') ? 'close' : 'menu';
        });
    </script>
</body>
</html>
